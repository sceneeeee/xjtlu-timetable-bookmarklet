<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample XJTLU Timetable</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f252d;
      }

      table.timetable {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        border: 1px solid #c9d2dc;
        vertical-align: top;
      }

      th {
        height: 36px;
        background: #edf2f7;
        font-weight: 700;
      }

      td.day-cell {
        min-height: 220px;
        padding: 8px;
      }

      .event {
        margin-bottom: 8px;
        border-left: 4px solid #0f6ea8;
        background: #f4f9fd;
        padding: 8px;
      }

      .event-name {
        margin-bottom: 6px;
        font-weight: 700;
      }

      .event-info {
        font-size: 13px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <table class="timetable">
      <thead>
        <tr>
          <th>Mon</th>
          <th>Tue</th>
          <th>Wed</th>
          <th>Thu</th>
          <th>Fri</th>
          <th>Sat</th>
          <th>Sun</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="day-cell" data-day="MON">
            <div class="event">
              <div class="event-name">MEC103-Lecture-D1</div>
              <div class="event-info">YAN YAN</div>
              <div class="event-info">SIP-EB237</div>
              <div class="event-info">Week: 1-6,8-</div>
              <div class="event-info">09:00 - 10:50</div>
            </div>
          </td>
          <td class="day-cell" data-day="TUE"></td>
          <td class="day-cell" data-day="WED">
            <div class="event">
              <div class="event-name">CSE205-Lab-C2</div>
              <div class="event-info">LI WEI</div>
              <div class="event-info">SIP-BS401</div>
              <div class="event-info">Week: 2,4,6,8</div>
              <div class="event-info">14:00 - 15:50</div>
            </div>
          </td>
          <td class="day-cell" data-day="THU"></td>
          <td class="day-cell" data-day="FRI">
            <div class="event">
              <div class="event-name">LAN001-Seminar-A1</div>
              <div class="event-info">No Teacher Listed</div>
              <div class="event-info">No Location Required</div>
              <div class="event-info">Week: 8-</div>
              <div class="event-info">11:00 - 12:50</div>
            </div>
          </td>
          <td class="day-cell" data-day="SAT"></td>
          <td class="day-cell" data-day="SUN"></td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
