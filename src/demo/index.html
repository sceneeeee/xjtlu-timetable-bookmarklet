<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XJTLU Timetable Exporter Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #20242c;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      p {
        max-width: 760px;
        margin: 0 0 12px;
        line-height: 1.55;
      }

      code {
        border-radius: 4px;
        background: #e8edf3;
        padding: 2px 5px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin: 24px 0;
      }

      button {
        min-height: 40px;
        border: 1px solid #1c5f8d;
        border-radius: 6px;
        background: #0f6ea8;
        color: white;
        padding: 0 16px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button:hover {
        background: #0b5f93;
      }

      iframe {
        width: 100%;
        height: 460px;
        border: 1px solid #c8d0da;
        border-radius: 6px;
        background: white;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>XJTLU Timetable Exporter Demo</h1>
      <p>
        Run <code>npm run dev</code>, open this page, then use the demo export button. The button runs
        the same bookmarklet flow against the sample XJTLU-like timetable loaded below.
      </p>
      <p>
        Use <code>2026-03-02</code> for Week 1 Monday and <code>13</code> for Last Week to match the
        sample data.
      </p>

      <div class="toolbar">
        <button id="run-demo-export" type="button">Run Demo Export</button>
      </div>

      <iframe id="demo-timetable-frame" src="./demoTimetable.html" title="Sample XJTLU timetable"></iframe>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
